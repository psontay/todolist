version: "3.8"
services:
  app:
    image: sontaypham/todolist:latest
    container_name: todolist_app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_INIT_ADMIN_USERNAME: ${SPRING_INIT_ADMIN_USERNAME}
      SPRING_INIT_ADMIN_PASSWORD: ${SPRING_INIT_ADMIN_PASSWORD}
      SPRING_INIT_ADMIN_EMAIL: ${SPRING_INIT_ADMIN_EMAIL}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_PASS: ${GMAIL_PASS}

  db:
    image: postgres:15
    container_name: todolist_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: todolist_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"


volumes:
  db_data:
